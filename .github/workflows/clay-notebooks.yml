name: Render Clay Notebooks

# Renders the literate Clay notebooks as a Quarto book and deploys it straight to
# GitHub Pages via the Pages artifact (Settings → Pages → Source: "GitHub Actions").
# Replaces the old CircleCI gh-pages-branch publish.

on:
  push:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'examples/**'
      - 'src/**'
      - 'deps.edn'
      - '.github/workflows/clay-notebooks.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  render-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 1.12.0.1488

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-maven-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: clojure -P -M:clay

      - name: Render the Clay notebook book → docs/
        run: clojure -M:clay -m notebooks.render

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
