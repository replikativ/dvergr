<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
    }
    .header {
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.connected { background: #4caf50; }
    .status-dot.error { background: #f44336; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #aaa;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: #0f3460;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #533483;
    }

    .btn {
      padding: 6px 12px;
      background: #533483;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
    }
    .btn:hover { background: #6a3fa0; }
    .btn-capture {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      background: #1a8870;
    }
    .btn-capture:hover { background: #22a288; }

    .captures {
      max-height: 200px;
      overflow-y: auto;
    }
    .capture-item {
      padding: 6px 0;
      border-bottom: 1px solid #2a2a4a;
      font-size: 12px;
    }
    .capture-item:last-child { border-bottom: none; }
    .capture-title {
      color: #b0b0d0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .capture-meta {
      color: #666;
      font-size: 11px;
      margin-top: 2px;
    }
    .capture-status {
      display: inline-block;
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 10px;
    }
    .capture-status.received { background: #1a4a1a; color: #4caf50; }
    .capture-status.filtered { background: #4a3a1a; color: #ff9800; }
    .capture-status.pending { background: #1a1a4a; color: #64b5f6; }
    .capture-status.error { background: #4a1a1a; color: #f44336; }

    .empty { color: #666; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Dvergr Feed</h1>
  </div>

  <div class="section">
    <button class="btn btn-capture" id="captureBtn">Capture This Page</button>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>
    <label for="urlInput">Dvergr URL</label>
    <input type="text" id="urlInput" placeholder="http://localhost:17880">
    <button class="btn" id="saveBtn">Save</button>
    <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="autoCapture" checked>
      <label for="autoCapture" style="margin: 0; cursor: pointer;">Auto-capture LinkedIn pages (5s delay)</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Captures</div>
    <div class="captures" id="capturesList">
      <div class="empty">No captures yet</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
